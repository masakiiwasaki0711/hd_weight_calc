<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>追加透析を検討する目安体重の計算ツール</title>
  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
      background:#f6f7fb;
      color:#111827;
    }
    .wrap{max-width:760px;margin:0 auto;padding:18px;}
    .header{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:16px;
    }
    h1{margin:0;font-size:20px;font-weight:800;}
    .sub{margin-top:8px;font-size:13px;color:#6b7280;}
    .card{
      margin-top:14px;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:16px;
    }
    label{font-size:13px;font-weight:600;}
    input{
      width:50%;
      font-size:22px;
      padding:12px;
      border-radius:12px;
      border:1px solid #d1d5db;
      margin-top:6px;
    }
    input:focus{
      border-color:#111827;
      outline:none;
      box-shadow:0 0 0 3px rgba(17,24,39,0.1);
    }
    .unit{margin-top:6px;font-size:13px;color:#6b7280;}
    .btnRow{margin-top:10px;}
    button{
      padding:10px 14px;
      border-radius:12px;
      border:1px solid #111827;
      background:#fff;
      cursor:pointer;
    }
    .resultBox{
      margin-top:16px;
      padding:14px;
      border-radius:14px;
      border:1px solid #e5e7eb;
      background:#f9fafb;
    }
    .resultLabel{font-size:13px;font-weight:700;}
    .resultValue{
      font-size:28px;
      font-weight:900;
      margin-top:4px;
    }
    details{
      margin-top:12px;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:10px;
      background:#fff;
    }
    summary{font-weight:800;cursor:pointer;}
    .row{
      display:flex;
      justify-content:space-between;
      padding:6px 0;
      font-size:13px;
      border-bottom:1px dashed #e5e7eb;
    }
    .row:last-child{border-bottom:0;font-weight:900;}
    .note{
      margin-top:10px;
      font-size:12px;
      color:#6b7280;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="header">
      <h1>追加透析を検討する目安体重</h1>
      <div class="sub">
        体重（kg）のみ入力してください。<br>
        ※氏名・IDなどの個人情報は入力しない運用としてください。
      </div>
    </div>

    <div class="card">
      <label>DW (kg)</label>
      <input type="number" id="weight" step="0.1" min="0" placeholder="例：50" />
      <div class="unit">小数入力可</div>

      <div class="btnRow">
        <button id="clearBtn">クリア</button>
      </div>

      <div class="resultBox">
        <div class="resultLabel">計算結果</div>
        <div class="resultValue" id="output">0.0000</div>
      </div>
<div class="note">
  ※この結果は追加透析の目安であり、最終判断は臨床状況をふまえて行ってください。
</div>
      <details>
        <summary>計算根拠（内訳）を表示</summary>
        <div id="breakdown"></div>
      </details>

      <div class="note">
        係数：0–40kg×0.025、40–60kg×0.022、60–80kg×0.019、80kg超×0.016<br>
        係数は作成者の経験をもとに独自に決めています。今後変更する可能性があります。
      </div>
    </div>

  </div>

  <script>
    function calcBreakdown(w){
      const x = (!isFinite(w) || w < 0) ? 0 : w;

      const w1 = Math.min(x,40);
      const w2 = Math.min(Math.max(x-40,0),20);
      const w3 = Math.min(Math.max(x-60,0),20);
      const w4 = Math.max(x-80,0);

      const r1 = w1*0.025;
      const r2 = w2*0.022;
      const r3 = w3*0.019;
      const r4 = w4*0.016;

      return {
        total:r1+r2+r3+r4,
        rows:[
          ["0–40kg",w1,0.025,r1],
          ["40–60kg",w2,0.022,r2],
          ["60–80kg",w3,0.019,r3],
          ["80kg超",w4,0.016,r4]
        ]
      };
    }

    const weightEl=document.getElementById("weight");
    const output=document.getElementById("output");
    const breakdown=document.getElementById("breakdown");

    function render(){
      const w=parseFloat(weightEl.value);
      const b=calcBreakdown(w);

      output.textContent=b.total.toFixed(4);

      breakdown.innerHTML="";
      b.rows.forEach(r=>{
        breakdown.innerHTML+=`
          <div class="row">
            <div>${r[0]}</div>
            <div>${r[1].toFixed(1)} × ${r[2]} = ${r[3].toFixed(4)}</div>
          </div>
        `;
      });
      breakdown.innerHTML+=`
        <div class="row">
          <div>合計</div>
          <div>${b.total.toFixed(4)}</div>
        </div>
      `;
    }

    weightEl.addEventListener("input",render);

    document.getElementById("clearBtn").addEventListener("click",()=>{
      weightEl.value="";
      render();
      weightEl.focus();
    });

    render();
  </script>
</body>
</html>
